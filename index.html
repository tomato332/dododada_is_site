<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tomato332</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/darcula.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>
    <div id="cursor-glow"></div>

    <!-- Header -->
    <div class="header" id="header">
        <img class="avatar" src="https://avatars.githubusercontent.com/tomato332" alt="" />
        <span class="name">tomato332</span>
        <div class="header-links">
            <a href="https://github.com/tomato332" target="_blank">github</a>
            <a href="game/index.html" target="_blank">game</a>
            <a href="#" id="headerClickerBtn">clicker</a>
            <a href="#" id="headerShopBtn">shop</a>
        </div>
        <button class="header-toggle" id="toggleReposBtn">▾ repos</button>
    </div>

    <!-- Floating repos panel -->
    <div id="repos-overlay"></div>
    <div id="repos-panel">
        <button class="close-btn" id="closeReposBtn">✕</button>
        <div class="section-title">Repositories</div>
        <div class="loading" id="loading">불러오는 중...</div>
        <div id="content"></div>
    </div>

    <!-- Hero -->
    <div class="hero" id="hero">
        <div class="avatar-wrap">
            <img class="avatar" src="https://avatars.githubusercontent.com/tomato332" alt="tomato332" />
        </div>
        <div class="name">tomato332</div>
        <div class="hero-links">
            <a href="https://github.com/tomato332" target="_blank">github</a>
            <a href="game/index.html" target="_blank">game</a>
            <a href="#" id="heroClickerBtn">clicker</a>
            <a href="#" id="heroShopBtn">shop</a>
        </div>
        <div class="stats">
            <img src="https://github-readme-stats.vercel.app/api?username=tomato332&show_icons=true&theme=dark&bg_color=0d1117&border_color=30363d&text_color=c9d1d9&icon_color=58a6ff" alt="GitHub Stats" />
        </div>
    </div>

    <!-- Floating clicker panel -->
    <div id="clicker-overlay"></div>
    <div id="clicker-panel">
        <button class="close-btn" id="closeClickerBtn">✕</button>
        <div class="section-title">🍅 Tomato Clicker</div>
        <div class="clicker-label">TOMATOES</div>
        <div class="clicker-score" id="clicker-score">0</div>
        <div class="clicker-tomato" id="clicker-tomato">🍅</div>
        <div style="font-size:.6rem;color:var(--muted);font-family:'Press Start 2P',monospace;margin-bottom:12px;">→ CLICK THE TOMATO ←</div>
        <div class="clicker-stat-row">
            <span class="label">CLICK POWER</span>
            <span class="value" id="clicker-power">+1</span>
        </div>
        <div class="clicker-stat-row">
            <span class="label">AUTO CLICK /s</span>
            <span class="value" id="clicker-auto">0</span>
        </div>
        <div style="margin-top:12px;border-top:2px solid var(--border);padding-top:12px;">
            <button class="clicker-btn" id="upgrade-power" data-cost="10">⬆ UPGRADE POWER (10 🍅)</button>
            <button class="clicker-btn" id="upgrade-auto" data-cost="25">⏰ AUTO CLICKER (25 🍅)</button>
        </div>
        <div style="margin-top:8px;font-size:.6rem;color:var(--muted);" id="clicker-stats">
            TOTAL CLICKS: 0
        </div>
    </div>

    <!-- Floating shop panel -->
    <div id="shop-overlay"></div>
    <div id="shop-panel">
        <button class="close-btn" id="closeShopBtn">✕</button>
        <div class="section-title">🛒 Decoration Shop</div>
        <div class="shop-balance" id="shop-balance">🍅 0</div>
        <div id="shop-items"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/shell/shell.min.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
