<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 배경색 바꾸기</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            transition: background-color 0.3s ease;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎨 기분 전환 페이지</h1>
        <p>아래 버튼을 눌러 배경색을 바꿔보세요!</p>
        <button onclick="changeBackgroundColor()">색상 변경하기</button>
    </div>

    <script>
        function changeBackgroundColor() {
            // 무작위 RGB 색상 생성
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            
            // body의 배경색으로 적용
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }
    </script>

</body>
</html>
