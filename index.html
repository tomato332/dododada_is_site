<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tomato332</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #fafafa; --text: #1a1a1a; --muted: #888; --border: #e0e0e0; --accent: #d4d4d4; }
        .dark { --bg: #0d1117; --text: #c9d1d9; --muted: #555; --border: #30363d; --accent: #3a3a3a; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 40px;
            transition: background .3s, color .3s;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 50%, var(--accent) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 80% 20%, var(--accent) 0%, transparent 70%);
            opacity: .4;
            pointer-events: none;
            transition: opacity .3s;
        }
        .profile { display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; }
        .avatar {
            width: 88px; height: 88px; border-radius: 50%;
            border: 2px solid var(--border);
            transition: border-color .3s, transform .4s ease;
            position: relative;
        }
        .avatar:hover { transform: scale(1.06); }
        .name { font-size: 1.3rem; font-weight: 600; letter-spacing: -.02em; }
        .name span { opacity: .5; font-weight: 300; }
        .links { display: flex; gap: 24px; position: relative; }
        .links a {
            color: var(--muted);
            text-decoration: none;
            font-size: .9rem;
            letter-spacing: .04em;
            text-transform: uppercase;
            transition: color .2s;
            position: relative;
            padding: 4px 0;
        }
        .links a::after {
            content: '';
            position: absolute; bottom: 0; left: 0;
            width: 0; height: 1.5px;
            background: currentColor;
            transition: width .25s ease;
        }
        .links a:hover { color: var(--text); }
        .links a:hover::after { width: 100%; }
        .stats {
            position: relative;
            opacity: .7;
            transition: opacity .3s;
        }
        .stats:hover { opacity: 1; }
        .stats img { max-width: 380px; border-radius: 8px; display: block; }
        .theme-btn {
            position: fixed; top: 24px; right: 28px;
            background: none; border: none; cursor: pointer;
            font-size: 1.2rem; line-height: 1;
            color: var(--muted);
            transition: color .2s, transform .3s;
            z-index: 10;
        }
        .theme-btn:hover { color: var(--text); transform: rotate(12deg); }
        .footer {
            position: fixed; bottom: 24px;
            font-size: .75rem; color: var(--muted);
            opacity: .4;
            letter-spacing: .03em;
        }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>

    <div class="profile">
        <img class="avatar" src="https://avatars.githubusercontent.com/tomato332" alt="tomato332" />
        <div class="name">tomato332</div>
    </div>

    <div class="links">
        <a href="https://github.com/tomato332" target="_blank">github</a>
        <a href="goongsu.html" target="_blank">game</a>
    </div>

    <div class="stats">
        <img src="https://github-readme-stats.vercel.app/api?username=tomato332&show_icons=true&theme=dark&bg_color=0d1117&border_color=30363d&text_color=c9d1d9&icon_color=58a6ff" alt="GitHub Stats" />
    </div>

    <div class="footer">tomato332</div>

    <script>
        const html = document.documentElement;
        const btn = document.querySelector('.theme-btn');
        const saved = localStorage.getItem('theme');
        if (saved === 'light') { html.classList.remove('dark'); btn.textContent = '🌙'; }
        else { html.classList.add('dark'); btn.textContent = '☀️'; }
        function toggleTheme() {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            btn.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
    </script>
</body>
</html>
